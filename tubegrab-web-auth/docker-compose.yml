version: '3.8'

services:
  tubegrab:
    build: .
    container_name: tubegrab-web-auth
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BIND_HOST=0.0.0.0
      - AUTH_USERNAME=${AUTH_USERNAME:?AUTH_USERNAME is required}
      - AUTH_PASSWORD=${AUTH_PASSWORD:?AUTH_PASSWORD is required}
      - AUTH_REALM=${AUTH_REALM:-TubeGrab Protected}
      - DOWNLOAD_START_RATE_LIMIT_MAX=${DOWNLOAD_START_RATE_LIMIT_MAX:-60}
      - YTDLP_COOKIES=/app/cookies.txt
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
      - JOB_MAP_CAP=${JOB_MAP_CAP:-500}
      - MAX_DURATION_SECONDS=${MAX_DURATION_SECONDS:-}
      - MAX_FILESIZE_BYTES=${MAX_FILESIZE_BYTES:-}
    volumes:
      - downloads:/app/downloads
      - ./cookies.txt:/app/cookies.txt:ro
    restart: unless-stopped
    mem_limit: 1g

volumes:
  downloads:
